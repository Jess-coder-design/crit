<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 200px;
      padding: 10px;
      font-family: "PT Sans", sans-serif;
    }
    
    .button-group {
      display: flex;
      gap: 8px;
    }
    
    button {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 0;
      font-size: 14px;
      cursor: pointer;
      font-weight: 400;
      font-family: "PT Sans", sans-serif;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    
    button:hover {
      transform: scale(1.05);
    }
    
    #toggleBtn {
      background-color: #FF6600;
      color: white;
    }
    
    #toggleBtn:active {
      background-color: #E55A00;
    }
    
    #addBtn {
      background-color: #d3d3d3;
      color: #333;
      box-shadow: inset 0 0 12px 2px rgba(255, 102, 0, 0.6);
    }
    
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #666;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="button-group">
    <button id="toggleBtn">Disable Orange Blur</button>
    <button id="addBtn">Add</button>
  </div>
  <div id="status">Blur: ON</div>
</body>
<script src="popup.js"></script>
</html>
