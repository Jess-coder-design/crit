<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 350px;
      padding: 10px;
      font-family: "PT Sans", sans-serif;
      margin: 0;
    }
    
    .button-group {
      display: flex;
      gap: 8px;
    }
    
    button {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 0;
      font-size: 14px;
      cursor: pointer;
      font-weight: 400;
      font-family: "PT Sans", sans-serif;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    
    button:hover {
      transform: scale(1.05);
    }
    
    #toggleBtn {
      background-color: #FF6600;
      color: white;
    }
    
    #toggleBtn:active {
      background-color: #E55A00;
    }
    
    #addBtn {
      background-color: #d3d3d3;
      color: #333;
      box-shadow: inset 0 0 12px 2px rgba(255, 102, 0, 0.6);
    }
    
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #666;
      text-align: center;
    }
    
    #savedPagesContainer {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #ddd;
      max-height: 300px;
      overflow-y: auto;
    }
    
    #savedPagesTitle {
      font-size: 12px;
      font-weight: bold;
      color: #333;
      margin-bottom: 8px;
    }
    
    .page-item {
      font-size: 11px;
      background-color: #f5f5f5;
      border: 1px solid #ddd;
      padding: 6px;
      margin-bottom: 6px;
      border-radius: 2px;
    }
    
    .page-url {
      color: #0066cc;
      text-decoration: none;
      word-break: break-all;
      cursor: pointer;
      font-size: 10px;
    }
    
    .page-url:hover {
      text-decoration: underline;
    }
    
    .page-keywords {
      font-size: 10px;
      color: #666;
      margin-top: 4px;
    }
    
    .keyword-label {
      font-weight: bold;
      color: #333;
    }
    
    #clearBtn {
      width: 100%;
      padding: 6px;
      background-color: #ff4444;
      color: white;
      font-size: 11px;
      margin-top: 8px;
    }
    
    #clearBtn:hover {
      background-color: #cc0000;
    }
  </style>
</head>
<body>
  <div class="button-group">
    <button id="toggleBtn">Disable Orange Blur</button>
    <button id="addBtn">Add</button>
  </div>
  <div id="status">Blur: ON</div>
  
  <div id="savedPagesContainer">
    <div id="savedPagesTitle">Saved Pages</div>
    <div id="savedPagesList"></div>
    <button id="clearBtn">Clear All</button>
  </div>
</body>
<script src="popup.js"></script>
</html>
