        let points = [];
        let positionDataMap = {};

        // Load data AFTER colors are loaded (colors are loaded above)
        // Add a small delay to ensure colors are loaded first
        const loadDataAndCreateSprites = () => {
            Promise.all([
                fetch('landscape/json/landscape/position_3dmap.json').then(r => {
                    if (!r.ok) throw new Error('position_3dmap.json not found');
                    return r.json();
                }).catch(err => {
                    console.error('Error loading position data:', err);
                    throw err;
                }),
                fetch('landscape/json/landscape/3dmap_analysis.json').then(r => {
                    if (!r.ok) throw new Error('3dmap_analysis.json not found');
                    return r.json();
                }).catch(err => {
                    console.error('Error loading analysis data:', err);
                    throw err;
                })
            ]).then(([positionData, analysisDataArray]) => {
            console.log('Data loaded:', positionData.length, 'positions,', analysisDataArray.length, 'analysis entries');
            
            // Create a map of analysis data by sentence for keyword lookup
            const analysisMap = {};
            analysisDataArray.forEach(item => {
                analysisMap[item.sentence] = {
                    critical: item.critical || [],
                    design: item.design || []
                };
            });
            
            // Get min/max years from z values
            const yearsWithData = positionData
                .filter(p => p.z !== null && typeof p.z === 'number')
                .map(p => p.z);
            
            const minYear = yearsWithData.length > 0 ? Math.min(...yearsWithData) : 2000;
            const maxYear = yearsWithData.length > 0 ? Math.max(...yearsWithData) : 2025;
            
            console.log('Year range:', minYear, 'to', maxYear);
            console.log(`Loaded ${positionData.length} data points (${yearsWithData.length} with years)`);
            console.log('Sample z values:', yearsWithData.slice(0, 20));
            
            // Create axis labels now that we have minYear and maxYear
            // Spread factor for positioning (same as data points)
            const spreadFactor = 2.5;
            
            // Load axis orders from JSON file
            fetch('landscape/json/landscape/keywordsorder.json')
                .then(r => r.json())
                .then(orderData => {
                    const spreadFactor = 2.5;
                    
                    // THREE-LAYER SCALING:
                    // Layer 1: Semantic normalization (preserve meaning)
                    const CRITICAL_MAX = 6;    // Critical range: -2 to 6
                    const DESIGN_MAX = 15;     // Design range: -4 to 15
                    
                    // Actual data ranges (now matches semantic ranges exactly)
                    const CRITICAL_DATA_MIN = -2.0;
                    const CRITICAL_DATA_MAX = 5.0;
                    const DESIGN_DATA_MIN = -4.0;
                    const DESIGN_DATA_MAX = 15.0;
                    
                    // Layer 2: Visual weighting (intentional balance)
                    // Calculated to extend label range beyond data range for clarity
                    const CRITICAL_DATA_RANGE = CRITICAL_DATA_MAX - CRITICAL_DATA_MIN;  // 7.0
                    const DESIGN_DATA_RANGE = DESIGN_DATA_MAX - DESIGN_DATA_MIN;        // 19.0
                    const VISUAL_WEIGHT_X = 8.0 / CRITICAL_DATA_RANGE * 6;  // 6.86x scale to fill 8.0 range
                    const VISUAL_WEIGHT_Y = 6.0 / DESIGN_DATA_RANGE * 15;   // 4.74x scale to fill 6.0 range
                    
                    // Add X-axis (Critical) labels - straight line along X axis
                    Object.entries(orderData.criticalOrder).forEach(([text, value]) => {
                        // Layer 1: Semantic normalization to [-1, 1]
                        const normCritical = value / CRITICAL_MAX;
                        // Layer 2: Apply visual weight
                        const xNorm = normCritical * VISUAL_WEIGHT_X;
                        // Keep constant offset from axis
                        const worldPos = new THREE.Vector3(xNorm, -0.35, -spreadFactor);
                        createAxisLabelMoving(text, worldPos);
                    });
                    
                    // Add Y-axis (Design) labels - straight line along Y axis
                    Object.entries(orderData.designOrder).forEach(([text, value]) => {
                        // Layer 1: Semantic normalization to [-1, 1]
                        const normDesign = value / DESIGN_MAX;
                        // Layer 2: Apply visual weight
                        const yNorm = normDesign * VISUAL_WEIGHT_Y;
                        // Keep constant offset from axis
                        const worldPos = new THREE.Vector3(-0.35, yNorm, -spreadFactor);
                        createAxisLabelMoving(text, worldPos);
                    });
                    
                    // Add Z-axis (Year) labels - straight line along Z axis
                    const yearStart = Math.round(minYear);
                    const yearEnd = Math.round(maxYear);
                    const numYearLabels = 6;
                    for (let i = 0; i < numYearLabels; i++) {
                        const z = -1.0 * spreadFactor + (i / (numYearLabels - 1)) * 2 * spreadFactor;
                        const year = Math.round(yearStart + (i / (numYearLabels - 1)) * (yearEnd - yearStart));
                        // Keep constant offset from axis
                        const worldPos = new THREE.Vector3(-0.35, -0.35, z);
                        createAxisLabelMoving(year.toString(), worldPos);
                    }
                })
                .catch(err => console.error('Error loading keywordsorder.json:', err));
            
            // Create a map of position data with sentence info
            positionData.forEach((item, index) => {
                positionDataMap[index] = item;
            });

            // Create points
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const colors = [];
            
            // Critical and Design practice names for labels
            const criticalPractices = [
                "question", "critique", "critical", "interrogate", 
                "problematize", "reframe", "reflect", "position", "post-critical"
            ];
            const designPractices = [
                "work", "craft", "applied art", "practice", "design", "project", "plan",
                "intend", "iterate", "explore", "inquire", "analyze", "evaluate",
                "investigate", "conceptualize", "narrate", "discourse", "dialecticize",
                "systematize", "theorize"
            ];
            
            positionData.forEach((point, idx) => {
                // THREE-LAYER SCALING:
                // Layer 1: Semantic normalization (preserve meaning)
                // X: -2 to 6 (critical max = 6)
                // Y: -4 to 15 (design max = 15)
                // Layer 2: Visual weighting (intentional balance)
                // Layer 3: Screen mapping (consistent rendering)
                if (point.x !== null && point.y !== null) {
                    // Layer 1: Semantic normalization to [-1, 1]
                    const CRITICAL_MAX = 6;
                    const DESIGN_MAX = 15;
                    const normCritical = point.x / CRITICAL_MAX;  // preserves meaning
                    const normDesign = point.y / DESIGN_MAX;      // preserves meaning
                    
                    // Actual data ranges (now matches semantic ranges exactly)
                    const CRITICAL_DATA_MIN = -2.0;
                    const CRITICAL_DATA_MAX = 5.0;
                    const DESIGN_DATA_MIN = -4.0;
                    const DESIGN_DATA_MAX = 15.0;
                    
                    // Layer 2: Visual weight (matches axis label expansion)
                    const CRITICAL_DATA_RANGE = CRITICAL_DATA_MAX - CRITICAL_DATA_MIN;  // 7.0
                    const DESIGN_DATA_RANGE = DESIGN_DATA_MAX - DESIGN_DATA_MIN;        // 19.0
                    const VISUAL_WEIGHT_X = 8.0 / CRITICAL_DATA_RANGE * 6;  // 6.86x scale
                    const VISUAL_WEIGHT_Y = 6.0 / DESIGN_DATA_RANGE * 15;   // 4.74x scale
                    const xNorm = normCritical * VISUAL_WEIGHT_X;
                    const yNorm = normDesign * VISUAL_WEIGHT_Y;
                    
                    // Z: year, normalized to roughly -1 to 1 range
                    let zNorm = 0;
                    if (point.z !== null && typeof point.z === 'number') {
                        zNorm = ((point.z - minYear) / (maxYear - minYear) * 2) - 1;
                    }
                    
                    positions.push(xNorm, yNorm, zNorm);
                    
                    // Color by design practice (Y-axis)
                    const hue = (point.y + 4) / 19; // 0 to 1 hue
                    const color = new THREE.Color().setHSL(hue, 0.7, 0.5);
                    colors.push(color.r, color.g, color.b);
                }
            });

            console.log('Created', positions.length / 3, 'points');
            
            geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(new Float32Array(colors), 3));

            // Don't render point cloud - only text sprites
            // const material = new THREE.PointsMaterial({
            //     size: 0.02,
            //     vertexColors: true,
            //     sizeAttenuation: true
            // });
            // const pointCloud = new THREE.Points(geometry, material);
            // scene.add(pointCloud);

            // Store all sentence sprites for hover detection
            const sentenceSprites = [];

            // Function to update global reference
            function updateGlobalSprites() {
                allSentenceSprites = sentenceSprites;
            }

            // Create text sprites for sentences
            function createTextSprite(text, position, keywords = [], url = null, source = 'old') {
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d', { antialias: false });
                canvas.width = 2048;
                canvas.height = 1200;

                // Transparent background
                context.clearRect(0, 0, canvas.width, canvas.height);
                context.imageSmoothingEnabled = false;

                // Use full text (no truncation)
                const displayText = text;
                
                // Text styling will be set per word based on whether it's a keyword
                context.textAlign = 'left';
                context.textBaseline = 'top';
                
                // Set to larger font for accurate width measurement (since keywords use 90px)
                // Use italic for new entries
                const fontStyle = source === 'new' ? 'italic bold 90px PT Sans' : 'bold 90px PT Sans';
                context.font = fontStyle;
                
                // Word wrap - full text spread across multiple rows
                const words = displayText.split(' ');
                let line = '';
                let lines = [];
                const maxWidth = canvas.width - 50;  // Minimal margin for maximum text width
                
                for (let word of words) {
                    const testLine = line + (line ? ' ' : '') + word;
                    const metrics = context.measureText(testLine);
                    if (metrics.width > maxWidth && line) {
                        lines.push(line);
                        line = word;
                    } else {
                        line = testLine;
                    }
                }
                lines.push(line);

                const lineHeight = 100;
                const actualHeight = Math.min(lines.length * lineHeight + 80, canvas.height);
                const startY = 40;
                
                // Draw lines with colored keywords
                lines.forEach((line, lineIdx) => {
                    let x = 40;
                    const y = startY + lineIdx * lineHeight;
                    
                    // Split line into words
                    const lineWords = line.trim().split(/\s+/);
                    
                    lineWords.forEach((word, wordIdx) => {
                        // Remove punctuation but keep the word for display
                        const wordLower = word.toLowerCase().replace(/[^a-z\s-]/g, '');
                        let matchedColor = null;
                        
                        // Direct lookup in expanded keywordColors (includes all variations)
                        if (keywordColors[wordLower]) {
                            matchedColor = keywordColors[wordLower];
                        }
                        
                        const displayWord = word + (wordIdx < lineWords.length - 1 ? ' ' : '');
                        
                        // Set font and color based on keyword match
                        if (matchedColor) {
                            context.font = source === 'new' ? 'italic bold 90px PT Sans' : 'bold 90px PT Sans';
                            context.fillStyle = matchedColor;
                        } else {
                            context.font = source === 'new' ? 'italic 80px PT Sans' : '80px PT Sans';
                            context.fillStyle = '#333';
                        }
                        
                        // Draw word
                        context.fillText(displayWord, x, y);
                        x += context.measureText(displayWord).width;
                    });
                });

                const texture = new THREE.CanvasTexture(canvas);
                texture.magFilter = THREE.NearestFilter;
                texture.minFilter = THREE.NearestFilter;
                const spriteMaterial = new THREE.SpriteMaterial({ map: texture });
                const sprite = new THREE.Sprite(spriteMaterial);
                
                // Dynamic scaling based on line count and content
                // Canvas aspect ratio is 2048:1200 = 1.7:1
                // Scale up to compensate for larger canvas and maintain original size
                const scaleX = 0.45 + (Math.min(lines.length, 4) * 0.12);
                const scaleY = scaleX * (1200 / 2048);
                sprite.scale.set(scaleX, scaleY, 1);
                sprite.position.copy(position);
                
                // Store data for hover effect
                sprite.userData = {
                    isSentence: true,
                    text: text,
                    lines: lines,
                    keywords: keywords,
                    originalTexture: texture,
                    url: url,
                    source: source
                };
                
                return sprite;
            }

            // Create hover version of sprite with white background and highlighted keywords
            function createHoverTexture(lines, text, keywords) {
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d', { antialias: false });
                canvas.width = 2048;
                canvas.height = 1200;
                context.imageSmoothingEnabled = false;

                // Set to larger font for accurate width measurement
                context.font = 'bold 90px PT Sans';

                // White background box
                const padding = 20;
                const lineHeight = 100;
                const textWidth = canvas.width - 400;
                const textHeight = lines.length * lineHeight + 40;
                
                context.fillStyle = 'white';
                context.fillRect(20, 20, textWidth + padding * 2, textHeight + padding);
                
                // Border
                context.strokeStyle = '#333';
                context.lineWidth = 3;
                context.strokeRect(20, 20, textWidth + padding * 2, textHeight + padding);

                // Create unique keywords set for highlighting - combine sprite keywords with all known variations
                const uniqueKeywords = [...new Set(keywords.map(k => k.toLowerCase()))];
                
                // Draw text with highlighted keywords
                context.textAlign = 'left';
                context.textBaseline = 'top';
                
                const startY = 40;
                lines.forEach((line, lineIdx) => {
                    let x = 40;
                    const y = startY + lineIdx * lineHeight;
                    
                    // Split line into words while preserving spaces
                    const words = line.trim().split(/\s+/);
                    
                    words.forEach((word, wordIdx) => {
                        // Remove punctuation for color lookup
                        const wordLower = word.toLowerCase().replace(/[^a-z\s-]/g, '');
                        let matchedColor = null;
                        
                        // Direct lookup in expanded keywordColors (includes all variations)
                        if (keywordColors[wordLower]) {
                            matchedColor = keywordColors[wordLower];
                        }
                        
                        if (matchedColor) {
                            context.font = 'bold 90px PT Sans';
                            context.fillStyle = matchedColor;
                        } else {
                            context.font = '80px PT Sans';
                            context.fillStyle = '#333';
                        }
                        
                        context.fillText(word, x, y);
                        x += context.measureText(word + ' ').width;
                    });
                });

                const texture = new THREE.CanvasTexture(canvas);
                texture.magFilter = THREE.NearestFilter;
                texture.minFilter = THREE.NearestFilter;
                return texture;
            }

            // Add sprites for each point
            positionData.forEach((point, idx) => {
                if (point.x !== null && point.y !== null) {
                    // THREE-LAYER SCALING (matching axis labels):
                    // Layer 1: Semantic normalization
                    const CRITICAL_MAX = 6;
                    const DESIGN_MAX = 15;
                    const normCritical = point.x / CRITICAL_MAX;
                    const normDesign = point.y / DESIGN_MAX;
                    
                    // Layer 2: Visual weight (matches axis label expansion)
                    const CRITICAL_DATA_RANGE = 7.0;  // -2 to 5
                    const DESIGN_DATA_RANGE = 19.0;   // -4 to 15
                    const VISUAL_WEIGHT_X = 8.0 / CRITICAL_DATA_RANGE * 6;  // 6.86x
                    const VISUAL_WEIGHT_Y = 6.0 / DESIGN_DATA_RANGE * 15;   // 4.74x
                    const xNorm = normCritical * VISUAL_WEIGHT_X;
                    const yNorm = normDesign * VISUAL_WEIGHT_Y;
                    
                    // Z: year, normalized to roughly -1 to 1 range, then apply spreadFactor (same as axis labels)
                    let zNorm = 0;
                    if (point.z !== null && typeof point.z === 'number') {
                        const zNormalized = ((point.z - minYear) / (maxYear - minYear) * 2) - 1;
                        zNorm = zNormalized * spreadFactor;  // Apply spreadFactor to match axis labels
                    }
                    
                    // Get keywords for this sentence from analysis data
                    const analysis = analysisMap[point.sentence] || { critical: [], design: [] };
                    const keywords = [...analysis.critical, ...analysis.design];
                    
                    const position = new THREE.Vector3(xNorm, yNorm, zNorm);
                    const sprite = createTextSprite(point.sentence, position, keywords, point.url, point.source || 'old');
                    scene.add(sprite);
                    sentenceSprites.push(sprite);
                    
                    // Add star indicator for new submissions (expires after 1 day)
                    if (point.source === 'new') {
                        // Create small filled 5-pointed star
                        const shape = new THREE.Shape();
                        const numPoints = 5;
                        const outerRadius = 0.08;
                        const innerRadius = 0.035;
                        
                        for (let i = 0; i < numPoints * 2; i++) {
                            const angle = (i / (numPoints * 2)) * Math.PI * 2 - Math.PI / 2;
                            const radius = i % 2 === 0 ? outerRadius : innerRadius;
                            const x = Math.cos(angle) * radius;
                            const y = Math.sin(angle) * radius;
                            
                            if (i === 0) {
                                shape.moveTo(x, y);
                            } else {
                                shape.lineTo(x, y);
                            }
                        }
                        shape.lineTo(Math.cos(-Math.PI / 2) * outerRadius, Math.sin(-Math.PI / 2) * outerRadius);
                        
                        const starGeometry = new THREE.ShapeGeometry(shape);
                        const starMaterial = new THREE.MeshBasicMaterial({ color: 0xFF6600, side: THREE.DoubleSide });
                        const star = new THREE.Mesh(starGeometry, starMaterial);
                        star.position.copy(position);
                        
                        scene.add(star);
                        
                        // Schedule star removal after 1 day (86400000 ms)
                        const createdTime = new Date();
                        setTimeout(() => {
                            scene.remove(star);
                            star.geometry.dispose();
                            star.material.dispose();
                        }, 86400000);
                    }
                }
            });

            // Update global reference so keyword filtering can access sprites
            updateGlobalSprites();

            // Raycaster for hover detection
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            let hoveredSprite = null;

            renderer.domElement.addEventListener('mousemove', (event) => {
                mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

                raycaster.setFromCamera(mouse, camera);
                
                // Only check visible sprites for intersection
                const visibleSprites = sentenceSprites.filter(s => s.visible);
                const intersects = raycaster.intersectObjects(visibleSprites, false);
                
                // Find the sprite whose screen-projected text area is closest to the mouse
                let closestSprite = null;
                let closestDistance = Infinity;
                
                if (intersects.length > 0) {
                    for (const intersect of intersects) {
                        const sprite = intersect.object;
                        // Project sprite position to screen coordinates
                        const spritePos = sprite.position.clone();
                        spritePos.project(camera);
                        
                        // Text on canvas starts at x=40, y=40 on a 2048x768 canvas
                        // Adjust sprite screen position to account for text being left-aligned and top-aligned
                        const offsetX = sprite.scale.x * 0.3; // Shift comparison point left
                        const offsetY = sprite.scale.y * 0.4; // Shift comparison point up
                        
                        // Calculate distance from mouse to adjusted text position
                        const dx = (spritePos.x - offsetX) - mouse.x;
                        const dy = (spritePos.y + offsetY) - mouse.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        
                        if (distance < closestDistance) {
                            closestDistance = distance;
                            closestSprite = sprite;
                        }
                    }
                }

                // Reset previous hover
                if (hoveredSprite && hoveredSprite.userData.isSentence && hoveredSprite !== closestSprite) {
                    hoveredSprite.material.map = hoveredSprite.userData.originalTexture;
                    hoveredSprite.material.depthTest = true;
                    hoveredSprite.material.needsUpdate = true;
                    hoveredSprite.renderOrder = 0;
                    hoveredSprite = null;
                }

                if (closestSprite && closestSprite.userData.isSentence && closestSprite !== hoveredSprite) {
                    hoveredSprite = closestSprite;
                    const hoverTexture = createHoverTexture(closestSprite.userData.lines, closestSprite.userData.text, closestSprite.userData.keywords);
                    closestSprite.material.map = hoverTexture;
                    closestSprite.material.depthTest = false;
                    closestSprite.material.needsUpdate = true;
                    closestSprite.renderOrder = 999;
                }
            });

            // Reset hover when mouse leaves the canvas
            renderer.domElement.addEventListener('mouseleave', () => {
                if (hoveredSprite && hoveredSprite.userData.isSentence) {
                    hoveredSprite.material.map = hoveredSprite.userData.originalTexture;
                    hoveredSprite.material.depthTest = true;
                    hoveredSprite.material.needsUpdate = true;
                    hoveredSprite.renderOrder = 0;
                    hoveredSprite = null;
                }
            });
            
            // Track mouse movement to distinguish click from drag
            let mouseDownPos = { x: 0, y: 0 };
            let wasDragging = false;
            const dragThreshold = 5; // pixels
            
            renderer.domElement.addEventListener('pointerdown', (event) => {
                mouseDownPos.x = event.clientX;
                mouseDownPos.y = event.clientY;
                wasDragging = false;
            });
            
            renderer.domElement.addEventListener('pointerup', (event) => {
                const dx = event.clientX - mouseDownPos.x;
                const dy = event.clientY - mouseDownPos.y;
                wasDragging = Math.sqrt(dx * dx + dy * dy) > dragThreshold;
            });
            
            // Click handler to open source URL or clear filters on empty space
            renderer.domElement.addEventListener('click', (event) => {
                // Don't open URLs when in drawing mode or after dragging
                if (isDrawingMode || wasDragging) {
                    wasDragging = false; // Reset for next click
                    return;
                }
                
                mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
                
                raycaster.setFromCamera(mouse, camera);
                const visibleSprites = sentenceSprites.filter(s => s.visible);
                const intersects = raycaster.intersectObjects(visibleSprites, false);
                
                if (intersects.length > 0) {
                    const sprite = intersects[0].object;
                    if (sprite.userData.url) {
                        window.open(sprite.userData.url, '_blank');
                    }
                } else {
                    // Clicked on empty space - clear all filters
                    activeKeywordFilters.clear();
                    // Show all sprites
                    sentenceSprites.forEach(sprite => {
                        sprite.visible = true;
                    });
                    // Remove active styling from keywords
                    const keywordPanel = document.getElementById('keywordPanel');
                    keywordPanel.querySelectorAll('.keyword').forEach(el => {
                        el.style.opacity = '1';
                        el.style.transform = 'scale(1)';
                    });
                }
            });

            // Store point data for interaction
            points = positionData.filter(p => p.x !== null && p.y !== null).map((p, i) => {
                const xNorm = ((p.x - 1) / 8) * 2 - 1;
                const yNorm = ((p.y - 1) / 19) * 2 - 1;
                let zNorm = 0;
                if (p.z !== null && typeof p.z === 'number') {
                    zNorm = ((p.z - minYear) / (maxYear - minYear) * 2) - 1;
                }
                
                return {
                    position: new THREE.Vector3(xNorm, yNorm, zNorm),
                    url: p.url,
                    sentence: p.sentence,
                    index: i,
                    dominantCritical: p._dominant_critical_practice,
                    dominantDesign: p._dominant_design_practice,
                    criticalPos: p._critical_axis_position,
                    designPos: p._design_axis_position,
                    year: p.z
                };
            });

            // Hover detection removed - no tooltip display
            }).catch(err => {
                console.error('Failed to load data:', err);
            });
        };

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            updateAxisLabelPositions();
            renderer.render(scene, camera);
        }
        animate();

        // ============================================
        // SENTENCE ANIMATION FEATURE - For video demos
        // Usage: animateToSentence(sentenceText, panDuration, holdDuration)
        // ============================================
        
        function animateToSentence(sentenceSearchText, panDuration = 5000, holdDuration = 5000) {
            console.log('[animateToSentence] Starting animation for:', sentenceSearchText);
            console.log('[animateToSentence] Total sprites available:', allSentenceSprites.length);
            
            // Find the sprite that contains this sentence
            const sprite = allSentenceSprites.find(s => 
                s.userData.text.includes(sentenceSearchText) || 
                s.userData.text.toLowerCase().includes(sentenceSearchText.toLowerCase())
            );
            
            if (!sprite) {
                console.error('[animateToSentence] Sentence not found:', sentenceSearchText);
                console.log('[animateToSentence] Available sentences:', allSentenceSprites.map(s => s.userData.text.substring(0, 50)));
                return;
            }
            
            console.log('[animateToSentence] Found sprite at position:', sprite.position);
            console.log('[animateToSentence] Pan duration: ' + panDuration + 'ms, Hold duration: ' + holdDuration + 'ms');
            
            // Disable orbit controls during animation
            const wasControlsEnabled = controls.enabled;
            controls.enabled = false;
            
            // Start from origin (0, 0, 0) looking at it
            const startPos = new THREE.Vector3(0, 0, 0);
            
            // Calculate target position (slightly back from the sprite for good viewing angle)
            const targetPos = sprite.position.clone();
            targetPos.z -= 0.5;
            
            const startTime = Date.now();
            
            console.log('[animateToSentence] Starting position (origin):', startPos);
            console.log('[animateToSentence] Target position:', targetPos);
            
            function panCamera() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / panDuration, 1);
                
                camera.position.lerpVectors(startPos, targetPos, progress);
                camera.lookAt(sprite.position);
                
                if (progress < 1) {
                    requestAnimationFrame(panCamera);
                } else {
                    console.log('[animateToSentence] Pan complete, holding...');
                    // Pan complete, now hold for holdDuration
                    holdCamera();
                }
            }
            
            function holdCamera() {
                const holdStartTime = Date.now();
                
                function keep() {
                    const elapsed = Date.now() - holdStartTime;
                    
                    camera.lookAt(sprite.position);
                    
                    if (elapsed < holdDuration) {
                        requestAnimationFrame(keep);
                    } else {
                        // Animation complete, re-enable controls
                        controls.enabled = wasControlsEnabled;
                        console.log('[animateToSentence] Animation complete!');
                    }
                }
                
                keep();
            }
            
            panCamera();
        }

        // ============================================
        // SENTENCE SEQUENCE ANIMATION
        // Usage: playSequence([sentence1, sentence2, ...], panDuration, holdDuration)
        // ============================================
        
        function playSequence(sentenceArray, panDuration = 3000, holdDuration = 3000, initialDelay = 4000) {
            console.log('[playSequence] Starting sequence with', sentenceArray.length, 'sentences');
            console.log('[playSequence] Animation starts in', initialDelay + 'ms');
            
            let currentIndex = 0;
            
            function playNext() {
                if (currentIndex >= sentenceArray.length) {
                    console.log('[playSequence] Sequence complete!');
                    controls.enabled = true;
                    return;
                }
                
                const sentenceText = sentenceArray[currentIndex];
                // Handle holdDuration as array or single value
                const currentHoldDuration = Array.isArray(holdDuration) ? holdDuration[currentIndex] : holdDuration;
                console.log('[playSequence] Playing sentence', (currentIndex + 1) + '/' + sentenceArray.length);
                console.log('[playSequence] Searching for:', sentenceText.substring(0, 80));
                
                // Find the sprite - try exact match first, then try identifying phrases
                let sprite = allSentenceSprites.find(s => 
                    s.userData.text === sentenceText || 
                    s.userData.text === sentenceText.trim() ||
                    s.userData.text.trim() === sentenceText ||
                    s.userData.text.trim() === sentenceText.trim()
                );
                
                // Fallback: search for key identifying phrases
                if (!sprite) {
                    console.log('[playSequence] Exact match failed, searching for identifying phrases...');
                    
                    // Define identifying phrases for each sentence
                    let identifyingPhrases = [];
                    if (sentenceText.includes('designs not only raise awareness')) {
                        identifyingPhrases = ['designs not only raise awareness', 'encourage critical thinking'];
                    } else if (sentenceText.includes('Participatory design, critical design, service design')) {
                        identifyingPhrases = ['Participatory design, critical design', 'intentionally incorporate'];
                    } else if (sentenceText.includes('Garnet Hertz') || sentenceText.includes('critical making')) {
                        identifyingPhrases = ['Garnet Hertz', 'critical making', 'hands-on fabrication'];
                    }
                    
                    // Try to find by identifying phrases
                    sprite = allSentenceSprites.find(s => {
                        const text = s.userData.text.toLowerCase();
                        return identifyingPhrases.some(phrase => text.includes(phrase.toLowerCase()));
                    });
                }
                
                if (!sprite) {
                    console.warn('[playSequence] Sentence not found:', sentenceText.substring(0, 80));
                    console.log('[playSequence] Available sprites:', allSentenceSprites.length);
                    // Log first few sentences for debugging
                    console.log('[playSequence] Sample sentences:');
                    allSentenceSprites.slice(0, 5).forEach((s, i) => {
                        console.log('  ' + i + ':', s.userData.text.substring(0, 80));
                    });
                    currentIndex++;
                    setTimeout(playNext, 500); // Small delay before trying next
                    return;
                }
                
                console.log('[playSequence] Found sprite at position:', sprite.position);
                
                // Disable orbit controls
                controls.enabled = false;
                
                // Start from previous position or origin
                const startPos = camera.position.clone();
                const targetPos = sprite.position.clone();
                targetPos.z -= 0.5;
                
                const startTime = Date.now();
                
                function panCamera() {
                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(elapsed / panDuration, 1);
                    
                    camera.position.lerpVectors(startPos, targetPos, progress);
                    camera.lookAt(sprite.position);
                    
                    if (progress < 1) {
                        requestAnimationFrame(panCamera);
                    } else {
                        console.log('[playSequence] Pan complete, holding...');
                        // Pan complete, hold for holdDuration then play next
                        const holdStartTime = Date.now();
                        
                        function holdAndNext() {
                            const holdElapsed = Date.now() - holdStartTime;
                            camera.lookAt(sprite.position);
                            
                            if (holdElapsed < currentHoldDuration) {
                                requestAnimationFrame(holdAndNext);
                            } else {
                                console.log('[playSequence] Hold complete, moving to next...');
                                currentIndex++;
                                playNext();
                            }
                        }
                        
                        holdAndNext();
                    }
                }
                
                panCamera();
            }
            
            // Start with initial delay to allow inspector to close
            setTimeout(playNext, initialDelay);
        }

        // ============================================
        // SEARCH HELPER - Find sentences by keyword
        // ============================================
        
        window.searchSentences = function(keyword) {
            console.log('[searchSentences] Searching for:', keyword);
            const matches = allSentenceSprites.filter(s => 
                s.userData.text.toLowerCase().includes(keyword.toLowerCase())
            );
            console.log('[searchSentences] Found', matches.length, 'matches:');
            matches.forEach((s, i) => {
                console.log((i+1) + '. ' + s.userData.text);
            });
            return matches;
        };

        // ============================================
        // PRESET SEQUENCES - Call from console
        // ============================================
        
        window.playDesignCritiqueSentences = function() {
            const sentences = [
                "His designs not only raise awareness but also encourage critical thinking, helping us discover what we value and determine the steps we want to take into the future.",
                "Participatory design, critical design, service design, user centred design, empathic design, these are all regularly discussed paradigms and perspectives wherein techniques such as iterative design and gender mainstreaming are used to force the designer to intentionally incorporate the perspectives of the user within the very product itself.",
                "Garnet Hertz\nDefining Critical Making\nDefining Critical Making by Garnet Hertz\nPresentation\nThursday 19 November, 15.00-15.45\nIn this talk, Hertz provides overview of the concept of critical making, a concept where critical thinking is combined with hands-on fabrication to build devices that are designed to encourage discussion around social topics."
            ];
            // 4s initial delay, 2s pan time, custom hold per sentence (3s longer for sentence 2)
            const holdDurations = [5000, 8000, 5000]; // sentence 2 holds 3s longer
            playSequence(sentences, 2000, holdDurations, 4000);
        };
        
        // ============================================
        // AXIS EXPLORATION ANIMATION
        // Shows axes from origin, then pans along each to show labels
        // ============================================
        
        window.playAxisExploration = function(panDuration = 4000, holdDuration = 3000) {
            console.log('[playAxisExploration] Starting axis exploration');
            
            const axisLength = 2.0 * 2.5; // 5.0
            const spreadFactor = 2.5;
            
            // Define camera positions for each axis
            const axisPositions = [
                {
                    name: 'Origin',
                    pos: new THREE.Vector3(0, 0, 2),
                    target: new THREE.Vector3(0, 0, 0),
                    hold: 2000
                },
                {
                    name: 'X-Axis',
                    pos: new THREE.Vector3(axisLength * 0.6, 0, -spreadFactor + 1),
                    target: new THREE.Vector3(0, 0, -spreadFactor),
                    hold: holdDuration
                },
                {
                    name: 'Y-Axis',
                    pos: new THREE.Vector3(0, axisLength * 0.6, -spreadFactor + 1),
                    target: new THREE.Vector3(0, 0, -spreadFactor),
                    hold: holdDuration
                },
                {
                    name: 'Z-Axis',
                    pos: new THREE.Vector3(1, 0, axisLength * 0.6),
                    target: new THREE.Vector3(0, 0, 0),
                    hold: holdDuration
                }
            ];
            
            let currentStep = 0;
            controls.enabled = false;
            
            function playNextAxis() {
                if (currentStep >= axisPositions.length) {
                    console.log('[playAxisExploration] Exploration complete!');
                    controls.enabled = true;
                    return;
                }
                
                const step = axisPositions[currentStep];
                console.log('[playAxisExploration] Moving to', step.name);
                
                const startPos = camera.position.clone();
                const targetPos = step.pos.clone();
                const targetLookAt = step.target.clone();
                const startTime = Date.now();
                
                function panAxis() {
                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(elapsed / panDuration, 1);
                    
                    // Lerp camera position
                    camera.position.lerpVectors(startPos, targetPos, progress);
                    // Smooth camera lookAt
                    camera.lookAt(targetLookAt);
                    
                    if (progress < 1) {
                        requestAnimationFrame(panAxis);
                    } else {
                        console.log('[playAxisExploration] Pan complete, holding at', step.name);
                        const holdStartTime = Date.now();
                        
                        function holdAxis() {
                            const holdElapsed = Date.now() - holdStartTime;
                            camera.lookAt(targetLookAt);
                            
                            if (holdElapsed < step.hold) {
                                requestAnimationFrame(holdAxis);
                            } else {
                                console.log('[playAxisExploration] Hold complete, moving to next axis');
                                currentStep++;
                                playNextAxis();
                            }
                        }
                        
                        holdAxis();
                    }
                }
                
                panAxis();
            }
            
            // Start with small initial delay
            setTimeout(playNextAxis, 500);
        };
        
        console.log('[CRIT] Animation ready! Type: playDesignCritiqueSentences() to play the sequence');
        console.log('[CRIT] Axis exploration! Type: playAxisExploration() to explore the axes');

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ============================================
        // 3D DRAWING LAYER - Toggle with 'D' key
        // Drawings exist in 3D space and rotate with the scene
        // ============================================
        const drawingIndicator = document.getElementById('drawingIndicator');
        const drawingControls = document.getElementById('drawingControls');
        const drawColorInput = document.getElementById('drawColor');
        const drawWidthInput = document.getElementById('drawWidth');
        const clearDrawingBtn = document.getElementById('clearDrawing');
        
        let isDrawingMode = false;
        let isDrawing = false;
        let currentLine = null;
        let currentLinePoints = [];
        let allDrawings = []; // Store all 3D line objects
        let snapOnNextPoint = false; // Flag to snap only the next point
        
        // Drawing settings
        let drawColor = '#000000';
        let drawWidth = 3;
        
        // Raycaster for detecting sentence sprites while drawing
        const drawingRaycaster = new THREE.Raycaster();
        drawingRaycaster.params.Sprite = { threshold: 0.5 }; // Increase sprite detection threshold
        let hoveredSpriteForDrawing = null;
        
        // Get 3D position from mouse - project onto a plane at camera's focal distance
        // Snaps to sprite position only when snapOnNextPoint is true and hovering over sprite
        
        function get3DPoint(event) {
            // If snap requested and hovering over a sprite, snap to its position
            if (snapOnNextPoint && hoveredSpriteForDrawing) {
                snapOnNextPoint = false; // Only snap once
                return hoveredSpriteForDrawing.position.clone();
            }
            snapOnNextPoint = false; // Clear flag even if no sprite
            
            const mouse = new THREE.Vector2();
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            // Project to a plane at the distance from camera to controls target
            const distance = camera.position.distanceTo(controls.target);
            
            // Get the direction from camera through mouse position
            const vector = new THREE.Vector3(mouse.x, mouse.y, 0.5);
            vector.unproject(camera);
            const direction = vector.sub(camera.position).normalize();
            
            // Calculate point at the target distance
            const point = camera.position.clone().add(direction.multiplyScalar(distance));
            return point;
        }
        
        // Track hovered sprite for drawing precision
        function updateHoveredSpriteForDrawing(event) {
            if (!isDrawingMode) {
                hoveredSpriteForDrawing = null;
                return;
            }
            
            const mouse = new THREE.Vector2();
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            drawingRaycaster.setFromCamera(mouse, camera);
            
            // Check visible sprites
            const visibleSprites = allSentenceSprites.filter(s => s.visible);
            const intersects = drawingRaycaster.intersectObjects(visibleSprites, false);
            
            if (intersects.length > 0) {
                hoveredSpriteForDrawing = intersects[0].object;
                renderer.domElement.style.cursor = 'pointer';
            } else {
                hoveredSpriteForDrawing = null;
                renderer.domElement.style.cursor = 'crosshair';
            }
        }
        
        // Update hover detection while moving in drawing mode (always, even while drawing)
        renderer.domElement.addEventListener('mousemove', (e) => {
            if (isDrawingMode) {
                updateHoveredSpriteForDrawing(e);
            }
        });
        
        // Create a new 3D line
        function createNewLine() {
            const material = new THREE.LineBasicMaterial({ 
                color: new THREE.Color(drawColor),
                linewidth: drawWidth
            });
            const geometry = new THREE.BufferGeometry();
            const line = new THREE.Line(geometry, material);
            line.frustumCulled = false;
            scene.add(line);
            allDrawings.push(line);
            return line;
        }
        
        // Update the current line with new points
        function updateLine(line, points) {
            if (points.length < 2) return;
            
            const positions = new Float32Array(points.length * 3);
            for (let i = 0; i < points.length; i++) {
                positions[i * 3] = points[i].x;
                positions[i * 3 + 1] = points[i].y;
                positions[i * 3 + 2] = points[i].z;
            }
            
            line.geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            line.geometry.attributes.position.needsUpdate = true;
        }
        
        // Toggle drawing mode with 'D' key
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'd') {
                isDrawingMode = !isDrawingMode;
                
                if (isDrawingMode) {
                    // drawingIndicator.style.display = 'block';
                    // drawingControls.style.display = 'flex';
                    renderer.domElement.style.cursor = 'crosshair';
                } else {
                    // drawingIndicator.style.display = 'none';
                    // drawingControls.style.display = 'none';
                    renderer.domElement.style.cursor = 'default';
                }
            }
            
            // Escape also exits drawing mode
            if (e.key === 'Escape' && isDrawingMode) {
                isDrawingMode = false;
                drawingIndicator.style.display = 'none';
                drawingControls.style.display = 'none';
                renderer.domElement.style.cursor = 'default';
            }
        });
        
        // Track if we're currently drawing to block OrbitControls
        let blockControls = false;
        
        // Intercept mousedown on renderer - use pointerdown for better compatibility
        renderer.domElement.addEventListener('pointerdown', (e) => {
            if (!isDrawingMode || e.button !== 0) return;
            
            e.preventDefault();
            e.stopImmediatePropagation();
            blockControls = true;
            controls.enabled = false;
            
            isDrawing = true;
            currentLinePoints = []; // Fresh array for new stroke
            currentLine = createNewLine(); // New separate line object
            
            // Check current hover state for first point snap
            updateHoveredSpriteForDrawing(e);
            snapOnNextPoint = true;
            const point = get3DPoint(e);
            currentLinePoints.push(point);
        }, true); // Capture phase
        
        window.addEventListener('pointermove', (e) => {
            if (!isDrawing || !isDrawingMode) return;
            
            // Update hover detection (for potential end-snap)
            updateHoveredSpriteForDrawing(e);
            
            // Normal drawing - no snapping during stroke for smooth curves
            const point = get3DPoint(e);
            currentLinePoints.push(point);
            updateLine(currentLine, currentLinePoints);
        });
        
        window.addEventListener('pointerup', (e) => {
            if (isDrawing && isDrawingMode) {
                // If ending on a sprite, snap the final point to it
                if (hoveredSpriteForDrawing && currentLine && currentLinePoints.length > 0) {
                    currentLinePoints.push(hoveredSpriteForDrawing.position.clone());
                    updateLine(currentLine, currentLinePoints);
                }
                
                isDrawing = false;
                currentLine = null;
                currentLinePoints = [];
                hoveredSpriteForDrawing = null; // Clear for clean next stroke
            }
            if (blockControls) {
                blockControls = false;
                controls.enabled = true;
            }
        });
        
        // Touch support for 3D drawing
        renderer.domElement.addEventListener('touchstart', (e) => {
            if (!isDrawingMode) return;
            e.preventDefault();
            
            isDrawing = true;
            currentLinePoints = [];
            currentLine = createNewLine();
            
            const touch = e.touches[0];
            // Update hover detection and snap first point
            updateHoveredSpriteForDrawing({ clientX: touch.clientX, clientY: touch.clientY });
            snapOnNextPoint = true;
            const point = get3DPoint({ clientX: touch.clientX, clientY: touch.clientY });
            currentLinePoints.push(point);
        }, { passive: false });
        
        renderer.domElement.addEventListener('touchmove', (e) => {
            if (!isDrawing || !isDrawingMode) return;
            e.preventDefault();
            
            const touch = e.touches[0];
            // Update hover detection for potential end-snap
            updateHoveredSpriteForDrawing({ clientX: touch.clientX, clientY: touch.clientY });
            // Normal drawing - no snapping during stroke
            const point = get3DPoint({ clientX: touch.clientX, clientY: touch.clientY });
            currentLinePoints.push(point);
            updateLine(currentLine, currentLinePoints);
        }, { passive: false });
        
        renderer.domElement.addEventListener('touchend', () => {
            if (isDrawing && isDrawingMode) {
                // If ending on a sprite, snap the final point to it
                if (hoveredSpriteForDrawing && currentLine && currentLinePoints.length > 0) {
                    currentLinePoints.push(hoveredSpriteForDrawing.position.clone());
                    updateLine(currentLine, currentLinePoints);
                }
                
                isDrawing = false;
                currentLine = null;
                currentLinePoints = [];
            }
        });
        
        // Color and width controls
        drawColorInput.addEventListener('input', (e) => {
            drawColor = e.target.value;
        });
        
        drawWidthInput.addEventListener('input', (e) => {
            drawWidth = parseInt(e.target.value);
        });
        
        // Clear all drawings
        clearDrawingBtn.addEventListener('click', () => {
            allDrawings.forEach(line => {
                scene.remove(line);
                line.geometry.dispose();
                line.material.dispose();
            });
            allDrawings = [];
        });
    </script>

    <!-- Glow overlay for orange blur effect at edges (for normal screen size) -->
    <div class="glow-overlay"></div>
