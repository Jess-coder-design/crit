<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Design Discourse Landscape</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">

</head>
<body>
    <a href="about.html" id="crit-logo">CR!T</a>
    <div class="keyword-container">
        <button id="keywordToggle">Keywords</button>
        <div id="keywordPanel" class="keyword-panel"></div>
    </div>
    <div class="submissions-container">
        <button id="submissionsToggle">New Submissions</button>
        <div id="submissionsPanel" class="submissions-panel"></div>
    </div>
    <div id="tooltip"></div>
    
    <!-- Axis labels overlay -->
    <div id="axisLabelsOverlay"></div>
    
    <!-- 3D Drawing mode controls -->
    <div id="drawingIndicator" style="display:none;">Drawing Mode: Left-click to draw, Right-click to rotate (press D to exit)</div>
    <div id="drawingControls" style="display:none;">
        <input type="color" id="drawColor" value="#000000" title="Line Color">
        <input type="range" id="drawWidth" min="1" max="20" value="3" title="Line Width">
        <button id="clearDrawing" title="Clear Drawing">Clear</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // Global keyword colors map and variations
        let keywordColors = {};
        let keywordVariations = {}; // Maps base keyword -> array of variations
        let variationToBase = {};   // Maps variation -> base keyword
        let activeKeywordFilters = new Set(); // Set of active keyword filters for multi-select
        let allSentenceSprites = [];

        // ============================================
        // SEARCH HELPER - Find sentences by keyword
        // ============================================
        
        window.searchSentences = function(keyword) {
            console.log('[searchSentences] Searching for:', keyword);
            const matches = allSentenceSprites.filter(s => 
                s.userData && s.userData.text && s.userData.text.toLowerCase().includes(keyword.toLowerCase())
            );
            console.log('[searchSentences] Found', matches.length, 'matches:');
            matches.forEach((s, i) => {
                console.log((i+1) + '. ' + s.userData.text);
            });
            return matches;
        };

        // Load colors and keywords first, then proceed with data loading
        Promise.all([
            fetch('landscape/json/landscape/keywords.json').then(r => r.json()),
            fetch('landscape/json/landscape/colors.json').then(r => r.json())
        ])
        .then(([keywordsData, colorsData]) => {
            // Build variation maps from keywords.json
            // Build variation maps from x-axis (critical) keywords
            if (keywordsData['x-axis'] && keywordsData['x-axis'].critical) {
                Object.entries(keywordsData['x-axis'].critical).forEach(([baseKeyword, variations]) => {
                    keywordVariations[baseKeyword.toLowerCase()] = variations.map(v => v.toLowerCase());
                    variations.forEach(v => {
                        variationToBase[v.toLowerCase()] = baseKeyword.toLowerCase();
                    });
                });
            }
            // Build variation maps from y-axis (design) keywords
            if (keywordsData['y-axis'] && keywordsData['y-axis'].design) {
                Object.entries(keywordsData['y-axis'].design).forEach(([baseKeyword, variations]) => {
                    keywordVariations[baseKeyword.toLowerCase()] = variations.map(v => v.toLowerCase());
                    variations.forEach(v => {
                        variationToBase[v.toLowerCase()] = baseKeyword.toLowerCase();
                    });
                });
            }

            // Build color map from colors.json - show base keywords in panel, but populate all variations in map
            const panel = document.getElementById('keywordPanel');
            let keywordsHtml = '';
            
            // Get unique base keywords from the variation map
            const baseKeywords = Object.keys(keywordVariations);
            
            // Add colors for all variations to the keywordColors map
            if (colorsData.criticalgroup) {
                Object.entries(colorsData.criticalgroup).forEach(([keyword, data]) => {
                    keywordColors[keyword.toLowerCase()] = data.color;
                });
            }
            
            if (colorsData.designgroup) {
                Object.entries(colorsData.designgroup).forEach(([keyword, data]) => {
                    keywordColors[keyword.toLowerCase()] = data.color;
                });
            }

            
            // Only show base keywords in the filter panel
            if (colorsData.criticalgroup) {
                baseKeywords.forEach(baseKeyword => {
                    if (colorsData.criticalgroup[baseKeyword]) {
                        const data = colorsData.criticalgroup[baseKeyword];
                        const safeKeyword = baseKeyword.replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                        keywordsHtml += `<span class="keyword" data-keyword="${baseKeyword.toLowerCase()}" style="background-color: ${data.color}; cursor: pointer;">${safeKeyword}</span>`;
                    }
                });
            }
            
            if (colorsData.designgroup) {
                baseKeywords.forEach(baseKeyword => {
                    if (colorsData.designgroup[baseKeyword]) {
                        const data = colorsData.designgroup[baseKeyword];
                        const safeKeyword = baseKeyword.replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                        keywordsHtml += `<span class="keyword" data-keyword="${baseKeyword.toLowerCase()}" style="background-color: ${data.color}; cursor: pointer;">${safeKeyword}</span>`;
                    }
                });
            }
            
            panel.innerHTML = keywordsHtml;

            // Add click handlers to keywords for filtering
            panel.querySelectorAll('.keyword').forEach(keywordEl => {
                keywordEl.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const clickedKeyword = keywordEl.dataset.keyword;
                    
                    // Toggle keyword selection
                    if (activeKeywordFilters.has(clickedKeyword)) {
                        activeKeywordFilters.delete(clickedKeyword);
                    } else {
                        activeKeywordFilters.add(clickedKeyword);
                    }
                    
                    // Update filter display
                    if (activeKeywordFilters.size === 0) {
                        // Show all sprites if no filter active
                        allSentenceSprites.forEach(sprite => {
                            sprite.visible = true;
                        });
                        // Show all submission items
                        submissionsPanel.querySelectorAll('.submission-item').forEach(item => {
                            item.style.display = '';
                        });
                        // Remove active styling from all keywords
                        panel.querySelectorAll('.keyword').forEach(el => {
                            el.style.opacity = '1';
                            el.style.transform = 'scale(1)';
                        });
                    } else {
                        // Filter sprites - show those containing ALL selected keywords
                        allSentenceSprites.forEach(sprite => {
                            const keywords = sprite.userData.keywords || [];
                            const hasAllKeywords = Array.from(activeKeywordFilters).every(selectedKeyword => {
                                return keywords.some(kw => {
                                    const baseKeyword = variationToBase[kw.toLowerCase()] || kw.toLowerCase();
                                    return baseKeyword === selectedKeyword;
                                });
                            });
                            sprite.visible = hasAllKeywords;
                        });
                        
                        // Also filter submission items to match keyword filters
                        submissionsPanel.querySelectorAll('.submission-item').forEach(item => {
                            // Extract keywords from the submission item's text content
                            const keywordDivs = item.querySelectorAll('.submission-keywords');
                            let criticalPractice = '';
                            let designPractice = '';
                            
                            if (keywordDivs.length >= 1) {
                                const criticalText = keywordDivs[0].textContent;
                                criticalPractice = criticalText.replace('Critical:', '').trim();
                            }
                            if (keywordDivs.length >= 2) {
                                const designText = keywordDivs[1].textContent;
                                designPractice = designText.replace('Design:', '').trim();
                            }
                            
                            // Check if submission's keywords match all selected filters
                            const matchesFilter = Array.from(activeKeywordFilters).every(selectedKeyword => {
                                const criLower = criticalPractice.toLowerCase();
                                const desLower = designPractice.toLowerCase();
                                const selectedLower = selectedKeyword.toLowerCase();
                                
                                const baseKeywordCrit = variationToBase[criLower] || criLower;
                                const baseKeywordDes = variationToBase[desLower] || desLower;
                                
                                return baseKeywordCrit === selectedLower || baseKeywordDes === selectedLower;
                            });
                            
                            item.style.display = matchesFilter ? '' : 'none';
                        });
                        
                        // Style active keywords
                        panel.querySelectorAll('.keyword').forEach(el => {
                            if (activeKeywordFilters.has(el.dataset.keyword)) {
                                el.style.opacity = '1';
                                el.style.transform = 'scale(1.1)';
                            } else {
                                el.style.opacity = '0.4';
                                el.style.transform = 'scale(1)';
                            }
                        });
                    }
                });
            });
            
            // Click on panel whitespace to clear all filters
            panel.addEventListener('click', (e) => {
                // Clear filters if clicking on empty space (not a keyword)
                if (!e.target.classList.contains('keyword')) {
                    activeKeywordFilters.clear();
                    // Show all sprites
                    allSentenceSprites.forEach(sprite => {
                        sprite.visible = true;
                    });
                    // Remove active styling from all keywords
                    panel.querySelectorAll('.keyword').forEach(el => {
                        el.style.opacity = '1';
                        el.style.transform = 'scale(1)';
                    });
                }
            });
            
            // Double-click to clear filters
            panel.addEventListener('dblclick', (e) => {
                e.preventDefault();
                e.stopPropagation();
                activeKeywordFilters.clear();
                // Show all sprites
                allSentenceSprites.forEach(sprite => {
                    sprite.visible = true;
                });
                // Remove active styling from all keywords
                panel.querySelectorAll('.keyword').forEach(el => {
                    el.style.opacity = '1';
                    el.style.transform = 'scale(1)';
                });
            });
            
            // Setup New Submissions panel
            const submissionsToggle = document.getElementById('submissionsToggle');
            const submissionsPanel = document.getElementById('submissionsPanel');
            
            submissionsToggle.addEventListener('click', () => {
                submissionsPanel.classList.toggle('open');
            });
            
            // Function to load and display new submissions
            function loadNewSubmissions() {
                // Add cache-busting parameter to always get fresh data
                fetch('landscape/json/landscape/position_3dmap.json?' + Date.now())
                    .then(r => r.json())
                    .then(data => {
                        console.log('[CRIT] Loaded position_3dmap.json, total entries:', data.length);
                        const newSubmissions = data.filter(item => item.source === 'new');
                        console.log('[CRIT] Found new submissions:', newSubmissions.length);
                        
                        if (newSubmissions.length === 0) {
                            submissionsPanel.innerHTML = '<div class="submissions-empty">No new submissions yet</div>';
                            console.log('[CRIT] No new submissions to display');
                            return;
                        }
                        
                        let html = '';
                        
                        // Sort submissions by timestamp, newest first
                        newSubmissions.sort((a, b) => {
                            const timeA = a.timestamp ? new Date(a.timestamp).getTime() : 0;
                            const timeB = b.timestamp ? new Date(b.timestamp).getTime() : 0;
                            return timeB - timeA;
                        });
                        
                        newSubmissions.forEach(item => {
                            const sentence = item.sentence;
                            const timestamp = item.timestamp ? new Date(item.timestamp).toLocaleDateString() : 'N/A';
                            
                            console.log('[CRIT] Displaying submission:', sentence, timestamp);
                            
                            html += `
                                <div class="submission-item" data-url="${item.url}" data-sentence="${item.sentence.replace(/"/g, '&quot;')}">
                                    <div class="submission-sentence">${sentence}</div>
                                    <div class="submission-date">${timestamp}</div>
                                </div>
                            `;
                        });
                        
                        submissionsPanel.innerHTML = html;
                        
                        // Add click handlers to jump to submission on map
                        submissionsPanel.querySelectorAll('.submission-item').forEach(item => {
                            item.addEventListener('click', (e) => {
                                if (e.target.tagName !== 'A') {
                                    e.preventDefault();
                                    const sentence = item.dataset.sentence;
                                    
                                    // Find the sprite with this sentence
                                    const sprite = allSentenceSprites.find(s => s.userData.text === sentence);
                                    if (sprite) {
                                        // Animate camera to sprite
                                        const targetPos = sprite.position.clone();
                                        targetPos.z -= 0.5;
                                        
                                        // Simple camera animation
                                        const startPos = camera.position.clone();
                                        const startTime = Date.now();
                                        const duration = 800; // milliseconds
                                        
                                        function animateCamera() {
                                            const elapsed = Date.now() - startTime;
                                            const progress = Math.min(elapsed / duration, 1);
                                            
                                            camera.position.lerpVectors(startPos, targetPos, progress);
                                            camera.lookAt(sprite.position);
                                            
                                            if (progress < 1) {
                                                requestAnimationFrame(animateCamera);
                                            }
                                        }
                                        
                                        animateCamera();
                                    }
                                }
                            });
                        });
                    })
                    .catch(err => console.error('[CRIT] Error loading submissions:', err));
            }
            
            // Load submissions initially
            loadNewSubmissions();
            
            // Reload submissions every 5 seconds to check for new entries
            setInterval(loadNewSubmissions, 5000);
            
            // Now load data and create sprites with colors already loaded
            loadDataAndCreateSprites();
        })
        .catch(err => console.error('Error loading colors:', err));

        // Keyword panel toggle
        const keywordToggle = document.getElementById('keywordToggle');
        const keywordPanel = document.getElementById('keywordPanel');
        keywordToggle.addEventListener('click', () => {
            keywordPanel.classList.toggle('open');
        });

        // Drag to scroll for keyword panel
        let isDown = false;
        let startX;
        let scrollLeft;

        keywordPanel.addEventListener('mousedown', (e) => {
            e.preventDefault();
            isDown = true;
            keywordPanel.classList.add('dragging');
            startX = e.pageX - keywordPanel.offsetLeft;
            scrollLeft = keywordPanel.scrollLeft;
        });

        keywordPanel.addEventListener('mouseleave', () => {
            isDown = false;
            keywordPanel.classList.remove('dragging');
        });

        keywordPanel.addEventListener('mouseup', () => {
            isDown = false;
            keywordPanel.classList.remove('dragging');
        });

        keywordPanel.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - keywordPanel.offsetLeft;
            const walk = (x - startX) * 1.5;
            keywordPanel.scrollLeft = scrollLeft - walk;
        });

        // Drag to scroll for submissions panel (same as keywords)
        const submissionsPanel = document.getElementById('submissionsPanel');
        let isDownSubmissions = false;
        let startXSubmissions;
        let scrollLeftSubmissions;

        submissionsPanel.addEventListener('mousedown', (e) => {
            e.preventDefault();
            isDownSubmissions = true;
            submissionsPanel.classList.add('dragging');
            startXSubmissions = e.pageX - submissionsPanel.offsetLeft;
            scrollLeftSubmissions = submissionsPanel.scrollLeft;
        });

        submissionsPanel.addEventListener('mouseleave', () => {
            isDownSubmissions = false;
            submissionsPanel.classList.remove('dragging');
        });

        submissionsPanel.addEventListener('mouseup', () => {
            isDownSubmissions = false;
            submissionsPanel.classList.remove('dragging');
        });

        submissionsPanel.addEventListener('mousemove', (e) => {
            if (!isDownSubmissions) return;
            e.preventDefault();
            const x = e.pageX - submissionsPanel.offsetLeft;
            const walk = (x - startXSubmissions) * 1.5;
            submissionsPanel.scrollLeft = scrollLeftSubmissions - walk;
        });

        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
        // Position camera much lower so axis cross is completely out of view, looking towards 2026, closer for zoom
        camera.position.set(0, -2, 0.5);
        camera.lookAt(0, 0, 10);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Declare axisLabels array at scene level
        let axisLabels = [];
        let fixedAxisLabels = []; // Labels that stay fixed on screen
        
        // Create axis labels as screen-space overlay elements
        const axisLabelsOverlay = document.getElementById('axisLabelsOverlay');
        
        function createAxisLabelScreenSpace(text, xPercent, yPercent) {
            const label = document.createElement('div');
            label.className = 'axis-label-item';
            label.textContent = text;
            label.style.left = xPercent + '%';
            label.style.top = yPercent + '%';
            label.style.transform = 'translate(-50%, -50%)';
            axisLabelsOverlay.appendChild(label);
            fixedAxisLabels.push({ 
                element: label, 
                text: text
            });
            return label;
        }
        
        function createAxisLabelMoving(text, worldPosition) {
            const label = document.createElement('div');
            label.className = 'axis-label-item';
            label.textContent = text;
            label.style.transform = 'translate(-50%, -50%)';
            axisLabelsOverlay.appendChild(label);
            axisLabels.push({ 
                element: label, 
                text: text,
                worldPosition: worldPosition
            });
            return label;
        }
        
        // Function to update moving axis label screen positions based on camera
        function updateAxisLabelPositions() {
            axisLabels.forEach(labelData => {
                // Project world position to screen space
                const screenPos = labelData.worldPosition.clone();
                screenPos.project(camera);
                
                // Convert from normalized device coordinates (-1 to 1) to screen percentages
                const xPercent = (screenPos.x + 1) / 2 * 100;
                const yPercent = (1 - screenPos.y) / 2 * 100;
                
                // Update position
                labelData.element.style.left = xPercent + '%';
                labelData.element.style.top = yPercent + '%';
                
                // Hide if behind camera
                if (screenPos.z > 1) {
                    labelData.element.style.display = 'none';
                } else {
                    labelData.element.style.display = 'block';
                }
            });
            
            // DIAGNOSTIC: Create a visual marker at (0,0) for debugging (commented out)
            /*
            if (!document.getElementById('origin-marker')) {
                const marker = document.createElement('div');
                marker.id = 'origin-marker';
                marker.style.position = 'fixed';
                marker.style.width = '10px';
                marker.style.height = '10px';
                marker.style.backgroundColor = 'red';
                marker.style.borderRadius = '50%';
                marker.style.pointerEvents = 'none';
                marker.style.zIndex = '9999';
                marker.style.transform = 'translate(-50%, -50%)';
                marker.title = '(0,0) origin point';
                document.body.appendChild(marker);
            }
            
            const marker = document.getElementById('origin-marker');
            // X and Y axes now intersect at (0, 0, -spreadFactor)

            const originYPercent = (1 - originScreenPos.y) / 2 * 100;
            marker.style.left = originXPercent + '%';
            marker.style.top = originYPercent + '%';
            */
        }

        // Custom controls: right-click + drag to rotate, scroll to zoom, left-click + drag to pan
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enableZoom = false; // Disable built-in zoom, we'll use custom linear zoom
        
        // Set mouse buttons: left=pan, middle=zoom, right=rotate
        controls.mouseButtons = {
            LEFT: THREE.MOUSE.PAN,
            MIDDLE: THREE.MOUSE.DOLLY,
            RIGHT: THREE.MOUSE.ROTATE
        };

        // Custom linear zoom - no limits
        const zoomSpeed = 0.2; // Constant zoom step
        renderer.domElement.addEventListener('wheel', (event) => {
            event.preventDefault();
            const direction = camera.position.clone().sub(controls.target).normalize();
            const zoomAmount = event.deltaY > 0 ? zoomSpeed : -zoomSpeed;
            camera.position.add(direction.multiplyScalar(zoomAmount));
        }, { passive: false });

        // Axes removed - only showing keyword labels

        // Grid removed - show only data points and axis labels

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        
        const pointLight = new THREE.PointLight(0xffffff, 0.6);
        pointLight.position.set(1.5, 1.5, 1.5);
        scene.add(pointLight);

        // Create 3D Axes
        const spreadFactor = 2.5;
        const axisLength = 2.0 * spreadFactor;
        const axisColor = 0x333333;
        const axisWidth = 2;

        // X-axis line (red) - passes through (0, 0)
        const xAxisGeometry = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(-axisLength, 0, -spreadFactor),
            new THREE.Vector3(axisLength, 0, -spreadFactor)
        ]);
        const xAxisMaterial = new THREE.LineBasicMaterial({ color: 0xff0000, linewidth: axisWidth });
        const xAxis = new THREE.Line(xAxisGeometry, xAxisMaterial);
        scene.add(xAxis);

        // Y-axis line (green) - passes through (0, 0)
        const yAxisGeometry = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(0, -axisLength, -spreadFactor),
            new THREE.Vector3(0, axisLength, -spreadFactor)
        ]);
        const yAxisMaterial = new THREE.LineBasicMaterial({ color: 0x00aa00, linewidth: axisWidth });
        const yAxis = new THREE.Line(yAxisGeometry, yAxisMaterial);
        scene.add(yAxis);

        // Z-axis line (blue) - passes through (0, 0) origin where X and Y intersect
        const zAxisGeometry = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(0, 0, -axisLength),
            new THREE.Vector3(0, 0, axisLength)
        ]);
        const zAxisMaterial = new THREE.LineBasicMaterial({ color: 0x0000ff, linewidth: axisWidth });
        const zAxis = new THREE.Line(zAxisGeometry, zAxisMaterial);
        scene.add(zAxis);

        // Add tick marks for axes (commented out)
        /*
        const tickSize = 0.15;
        const tickGeometries = [];

        for (let i = 0; i <= 8; i++) {
